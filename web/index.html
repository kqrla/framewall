<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>museum wall & frame generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #f5f5f5;
  color: #ccc;
  text-transform: lowercase;
  font-size: 13px;
}

/* ── sidebar ── */
.sidebar {
  width: 340px;
  min-width: 340px;
  background: #1e1e1e;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-right: 1px solid #333;
}

.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: #1e1e1e; }
.sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid #333;
}

.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}

.sidebar-header p {
  font-size: 11px;
  color: #888;
}

/* mode toggle */
.mode-toggle {
  display: flex;
  margin: 16px 20px;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: transparent;
  border: none;
  color: #888;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-transform: lowercase;
  transition: all 0.2s;
}

.mode-btn.active {
  background: #0d99ff;
  color: #fff;
  font-weight: 500;
}

/* controls area */
.controls {
  flex: 1;
  padding: 0 20px 20px;
  overflow-y: auto;
}

/* collapsible section */
.section {
  border-bottom: 1px solid #2a2a2a;
  padding: 12px 0;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  padding: 4px 0;
}

.section-header h3 {
  font-size: 12px;
  font-weight: 500;
  color: #aaa;
}

.section-header .chevron {
  font-size: 10px;
  color: #666;
  transition: transform 0.2s;
}

.section.collapsed .chevron { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }

.section-body {
  padding-top: 10px;
}

/* form elements */
label.field-label {
  display: block;
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
  margin-top: 10px;
}

label.field-label:first-child { margin-top: 0; }

select, input[type="text"], input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: #111;
  border: 1px solid #333;
  border-radius: 6px;
  color: #ddd;
  font-family: inherit;
  font-size: 12px;
  text-transform: lowercase;
  outline: none;
  transition: border-color 0.2s;
}

select:focus, input:focus {
  border-color: #0d99ff;
}

select { cursor: pointer; }

input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button { opacity: 1; }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.checkbox-row input[type="checkbox"] {
  accent-color: #0d99ff;
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.checkbox-row span {
  font-size: 12px;
  color: #bbb;
}

/* color swatches */
.swatch-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.swatch {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}

.swatch:hover { transform: scale(1.1); }
.swatch.active { border-color: #0d99ff; }

.hex-input-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  align-items: center;
}

.hex-input-row span {
  color: #666;
  font-size: 12px;
}

.hex-input-row input {
  flex: 1;
}

/* dimension inputs */
.dim-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.dim-row input { flex: 1; }
.dim-row span { color: #666; font-size: 14px; }

/* preset pills */
.preset-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.preset-pill {
  padding: 6px 10px;
  background: #111;
  border: 1px solid #333;
  border-radius: 16px;
  color: #aaa;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-transform: lowercase;
  transition: all 0.15s;
}

.preset-pill:hover { border-color: #0d99ff; color: #fff; }
.preset-pill.active { background: #0d99ff; border-color: #0d99ff; color: #fff; }

/* profile stack */
.profile-stack {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
  min-height: 28px;
}

.profile-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: #2a2a2a;
  border-radius: 12px;
  font-size: 11px;
  color: #bbb;
}

.profile-tag .remove-profile {
  cursor: pointer;
  color: #888;
  font-size: 14px;
  line-height: 1;
}

.profile-tag .remove-profile:hover { color: #ff4444; }

.add-profile-row {
  display: flex;
  gap: 6px;
}

.add-profile-row select { flex: 1; }

.add-btn {
  padding: 6px 12px;
  background: #0d99ff;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-transform: lowercase;
  white-space: nowrap;
}

.add-btn:hover { background: #0b85e0; }

/* ornament zone row */
.zone-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.zone-label {
  font-size: 11px;
  color: #666;
  width: 14px;
  text-align: center;
}

.zone-row select { flex: 1; }

/* bottom buttons */
.bottom-buttons {
  padding: 16px 20px;
  border-top: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-generate, .btn-export {
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-transform: lowercase;
  transition: background 0.2s;
}

.btn-generate {
  background: #0d99ff;
  color: #fff;
}

.btn-generate:hover { background: #0b85e0; }

.btn-export {
  background: #333;
  color: #ccc;
}

.btn-export:hover { background: #444; }

.export-group { position: relative; }

.export-dropdown {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 0; right: 0;
  margin-bottom: 4px;
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 8px;
  overflow: hidden;
  z-index: 100;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}

.export-dropdown.open { display: block; }

.export-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: transparent;
  border: none;
  width: 100%;
  color: #ccc;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  text-transform: lowercase;
  text-align: left;
  transition: background 0.15s;
}

.export-option:hover { background: #333; }
.export-option .fmt-label { font-weight: 500; color: #fff; min-width: 60px; }
.export-option .fmt-desc { color: #888; font-size: 11px; }
.export-option + .export-option { border-top: 1px solid #333; }

/* ── canvas area ── */
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background: #f5f5f5;
  overflow: hidden;
}

.canvas-wrapper {
  max-width: 100%;
  max-height: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}

canvas {
  display: block;
  max-width: 100%;
  max-height: calc(100vh - 80px);
  object-fit: contain;
}
</style>
</head>
<body>

<!-- sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>museum wall & frame generator</h1>
    <p>generate museum walls and ornate picture frames</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="background">background</button>
    <button class="mode-btn" data-mode="frames">frames</button>
  </div>

  <div class="controls" id="controls"></div>

  <div class="bottom-buttons">
    <button class="btn-generate" id="btn-generate">generate</button>
    <div class="export-group">
      <div class="export-dropdown" id="export-dropdown">
        <button class="export-option" data-fmt="png"><span class="fmt-label">png</span><span class="fmt-desc">raster, transparent-ready</span></button>
        <button class="export-option" data-fmt="jpeg"><span class="fmt-label">jpeg</span><span class="fmt-desc">compressed raster, smaller file</span></button>
        <button class="export-option" data-fmt="svg"><span class="fmt-label">svg</span><span class="fmt-desc">vector, scalable</span></button>
        <button class="export-option" data-fmt="html"><span class="fmt-label">html/css</span><span class="fmt-desc">standalone page with inline styles</span></button>
      </div>
      <button class="btn-export" id="btn-export">export &#9660;</button>
    </div>
  </div>
</div>

<!-- canvas area -->
<div class="canvas-area">
  <div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// helpers
// ════════════════════════════════════════════════════════════════

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;
const hexToRgb = (hex) => {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
};
const rgbToHex = (r, g, b) => '#' + [r,g,b].map(v => clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('');
const shadeColor = (hex, amt) => {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r+amt, g+amt, b+amt);
};
const mulColor = (hex, factor) => {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r*factor, g*factor, b*factor);
};

const seededRandom = (seed) => {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
};

// ════════════════════════════════════════════════════════════════
// palette
// ════════════════════════════════════════════════════════════════

const PAL = {
  wallColors: [
    '#8B0000','#800020','#4A0028','#722F37','#960018',
    '#003153','#00416A','#1B4D3E','#2E4053','#36454F',
    '#4B3621','#704214','#8B6914','#556B2F','#2F4F4F',
    '#F5F0E1','#FAF0E6','#FFF8DC','#F0EAD6','#EDEAE0',
    '#DAA520','#C5B358','#E6BE8A','#B8860B','#CFB53B',
    '#708090','#808080','#A9A9A9','#696969','#778899',
    '#800080','#9B59B6','#8E4585','#6A0DAD','#7851A9',
    '#FF6347','#E2725B','#CC5500','#D2691E','#CD853F',
    '#FFC0CB','#FFB6C1','#FF69B4','#DB7093','#C08081'
  ],
  lowerWallColors: [
    '#F5F0E1','#EDEAE0','#FAF0E6','#FFF8DC','#D3C6AA',
    '#2F1E14','#3E2723','#4A3728','#5C4033','#6B4423',
    '#708090','#808080','#A9A9A9','#BEBEBE','#C0C0C0',
    '#F5F5DC','#F0EAD6','#E8DCC8','#D2C4A8','#C4B896'
  ],
  baseboardColors: ['#F5F0E1','#2F1E14','#EDEAE0','#3E2723','#808080','#333333'],
  frameFinishes: {
    'gold leaf': '#DAA520',
    'antique gold': '#B8860B',
    'champagne gold': '#D4AF37',
    'silver leaf': '#C0C0C0',
    'bronze': '#8B6914',
    'black lacquer': '#1a1a1a',
    'white': '#F5F0E1',
    'oak': '#C19A6B',
    'walnut': '#5C4033',
    'mahogany': '#4E1609'
  }
};

// ════════════════════════════════════════════════════════════════
// state
// ════════════════════════════════════════════════════════════════

let currentMode = 'background';

const bgState = {
  wallType: 'painted',
  wallSubType: 'damask',
  wallColor: '#8B0000',
  dividerEnabled: true,
  dividerType: 'chair rail',
  lowerEnabled: true,
  lowerType: 'raised panel',
  lowerColor: '#F5F0E1',
  baseboardEnabled: true,
  baseboardColor: '#F5F0E1',
  width: 1778,
  height: 1000
};

const frameState = {
  preset: '',
  profiles: ['ogee','cushion','fillet','bead'],
  ornamentA: 'egg-and-dart',
  ornamentB: 'acanthus',
  ornamentC: 'bead',
  ornamentD: 'none',
  corners: 'floral burst',
  finish: 'gold leaf',
  liner: 'linen',
  aging: 'light',
  width: 400,
  height: 500
};

const wallSubTypes = {
  painted: [],
  wallpaper: ['damask','morris','stripes','flock','toile','brocade','leather'],
  wood: ['oak planks','walnut planks','mahogany planks'],
  fabric: ['silk','velvet','linen']
};

const profileOptions = ['flat','ogee','cushion','scoop','reverse scoop','bead','bolection','fillet','astragal','cavetto','scotia','chamfer','bevel','torus','quirk'];
const ornamentOptions = ['none','bead','bead & reel','egg-and-dart','acanthus','scrolls','shell','rope','laurel','greek key','guilloche','floral','vine'];
const cornerOptions = ['plain miter','floral burst','shell','cartouche','acanthus cluster','scroll volute'];
const linerOptions = ['none','linen','velvet','gold liner'];
const agingOptions = ['none','light','medium','heavy'];
const lowerWallTypes = ['beadboard','raised panel','flat panel','board & batten','stone','marble','wood planks'];
const dividerTypes = ['chair rail','molding','picture rail'];

const presets = {
  'renaissance': { profiles: ['ogee','flat','bead','fillet'], ornamentA: 'egg-and-dart', ornamentB: 'acanthus', ornamentC: 'bead', ornamentD: 'none', corners: 'acanthus cluster', finish: 'gold leaf', liner: 'linen', aging: 'medium' },
  'baroque': { profiles: ['bolection','ogee','cushion','bead','fillet'], ornamentA: 'acanthus', ornamentB: 'scrolls', ornamentC: 'shell', ornamentD: 'bead', corners: 'scroll volute', finish: 'gold leaf', liner: 'velvet', aging: 'light' },
  'rococo': { profiles: ['cushion','scoop','ogee','fillet'], ornamentA: 'scrolls', ornamentB: 'shell', ornamentC: 'floral', ornamentD: 'vine', corners: 'shell', finish: 'champagne gold', liner: 'linen', aging: 'light' },
  'neoclassical': { profiles: ['flat','ogee','fillet','bead'], ornamentA: 'greek key', ornamentB: 'laurel', ornamentC: 'bead & reel', ornamentD: 'none', corners: 'plain miter', finish: 'antique gold', liner: 'linen', aging: 'none' },
  'victorian': { profiles: ['ogee','cushion','scoop','bead','fillet'], ornamentA: 'egg-and-dart', ornamentB: 'floral', ornamentC: 'vine', ornamentD: 'bead', corners: 'floral burst', finish: 'walnut', liner: 'velvet', aging: 'medium' },
  'arts & crafts': { profiles: ['flat','chamfer','flat','fillet'], ornamentA: 'none', ornamentB: 'none', ornamentC: 'none', ornamentD: 'none', corners: 'plain miter', finish: 'oak', liner: 'none', aging: 'light' },
  'modern gallery': { profiles: ['flat','fillet'], ornamentA: 'none', ornamentB: 'none', ornamentC: 'none', ornamentD: 'none', corners: 'plain miter', finish: 'white', liner: 'none', aging: 'none' }
};

// ════════════════════════════════════════════════════════════════
// ui building
// ════════════════════════════════════════════════════════════════

const buildSelect = (id, options, value) => {
  const opts = options.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('');
  return `<select id="${id}">${opts}</select>`;
};

const buildSwatches = (id, colors, value) => {
  const swatches = colors.map(c =>
    `<div class="swatch ${c === value ? 'active' : ''}" data-group="${id}" data-color="${c}" style="background:${c}" title="${c}"></div>`
  ).join('');
  return `<div class="swatch-grid" data-group="${id}">${swatches}</div>
  <div class="hex-input-row"><span>#</span><input type="text" id="${id}-hex" value="${value.replace('#','')}" maxlength="6"></div>`;
};

const buildSection = (title, id, body, collapsed = false) =>
  `<div class="section ${collapsed ? 'collapsed' : ''}" id="section-${id}">
    <div class="section-header" data-section="${id}">
      <h3>${title}</h3>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="section-body">${body}</div>
  </div>`;

const renderBackgroundControls = () => {
  const wallTypeOpts = ['painted','wallpaper','wood','fabric'];
  const subTypes = wallSubTypes[bgState.wallType] || [];
  const showSub = subTypes.length > 0;

  let wallBody = `<label class="field-label">type</label>${buildSelect('wall-type', wallTypeOpts, bgState.wallType)}`;
  if (showSub) {
    wallBody += `<label class="field-label">sub-type</label>${buildSelect('wall-subtype', subTypes, bgState.wallSubType)}`;
  }
  wallBody += `<label class="field-label">color</label>${buildSwatches('wall-color', PAL.wallColors.slice(0,20), bgState.wallColor)}`;

  let divBody = `<div class="checkbox-row"><input type="checkbox" id="divider-enabled" ${bgState.dividerEnabled ? 'checked' : ''}><span>enabled</span></div>`;
  divBody += `<label class="field-label">type</label>${buildSelect('divider-type', dividerTypes, bgState.dividerType)}`;

  let lowerBody = `<div class="checkbox-row"><input type="checkbox" id="lower-enabled" ${bgState.lowerEnabled ? 'checked' : ''}><span>enabled</span></div>`;
  lowerBody += `<label class="field-label">type</label>${buildSelect('lower-type', lowerWallTypes, bgState.lowerType)}`;
  lowerBody += `<label class="field-label">color</label>${buildSwatches('lower-color', PAL.lowerWallColors, bgState.lowerColor)}`;

  let baseBody = `<div class="checkbox-row"><input type="checkbox" id="base-enabled" ${bgState.baseboardEnabled ? 'checked' : ''}><span>enabled</span></div>`;
  baseBody += `<label class="field-label">color</label>${buildSwatches('base-color', PAL.baseboardColors, bgState.baseboardColor)}`;

  let dimBody = `<label class="field-label">canvas size</label><div class="dim-row"><input type="number" id="bg-w" value="${bgState.width}" min="100" max="4000"><span>x</span><input type="number" id="bg-h" value="${bgState.height}" min="100" max="4000"></div>`;

  return buildSection('wall covering', 'wall', wallBody)
    + buildSection('divider', 'divider', divBody)
    + buildSection('lower wall', 'lower', lowerBody)
    + buildSection('baseboard', 'baseboard', baseBody)
    + buildSection('dimensions', 'bg-dim', dimBody);
};

const renderFrameControls = () => {
  let presetsHtml = `<div class="preset-row">`;
  for (const name of Object.keys(presets)) {
    presetsHtml += `<button class="preset-pill ${frameState.preset === name ? 'active' : ''}" data-preset="${name}">${name}</button>`;
  }
  presetsHtml += `</div>`;

  let profileHtml = `<div class="profile-stack" id="profile-stack">`;
  frameState.profiles.forEach((p, i) => {
    profileHtml += `<span class="profile-tag">${p}<span class="remove-profile" data-idx="${i}">&times;</span></span>`;
  });
  profileHtml += `</div>`;
  profileHtml += `<div class="add-profile-row">${buildSelect('add-profile-sel', profileOptions, profileOptions[0])}<button class="add-btn" id="add-profile-btn">+ add</button></div>`;

  let ornHtml = '';
  ['A','B','C','D'].forEach(z => {
    const key = `ornament${z}`;
    ornHtml += `<div class="zone-row"><span class="zone-label">${z.toLowerCase()}</span>${buildSelect(`orn-${z}`, ornamentOptions, frameState[key])}</div>`;
  });

  let cornerHtml = buildSelect('frame-corners', cornerOptions, frameState.corners);

  const finishNames = Object.keys(PAL.frameFinishes);
  const finishColors = finishNames.map(n => PAL.frameFinishes[n]);
  let finishHtml = `<div class="swatch-grid" data-group="frame-finish">`;
  finishNames.forEach((n, i) => {
    finishHtml += `<div class="swatch ${frameState.finish === n ? 'active' : ''}" data-group="frame-finish" data-color="${finishColors[i]}" data-name="${n}" style="background:${finishColors[i]}" title="${n}"></div>`;
  });
  finishHtml += `</div>`;

  let linerHtml = buildSelect('frame-liner', linerOptions, frameState.liner);
  let agingHtml = buildSelect('frame-aging', agingOptions, frameState.aging);

  let dimHtml = `<div class="dim-row"><input type="number" id="fr-w" value="${frameState.width}" min="50" max="2000"><span>x</span><input type="number" id="fr-h" value="${frameState.height}" min="50" max="2000"></div>`;

  return presetsHtml
    + buildSection('profile stack', 'profiles', profileHtml)
    + buildSection('ornament zones', 'ornaments', ornHtml)
    + buildSection('corners', 'corners', cornerHtml)
    + buildSection('finish', 'finish', finishHtml)
    + buildSection('liner', 'liner', linerHtml)
    + buildSection('aging', 'aging', agingHtml)
    + buildSection('dimensions', 'fr-dim', dimHtml);
};

const rebuildControls = () => {
  const el = $('#controls');
  el.innerHTML = currentMode === 'background' ? renderBackgroundControls() : renderFrameControls();
  attachControlListeners();
};

// ════════════════════════════════════════════════════════════════
// event wiring
// ════════════════════════════════════════════════════════════════

const attachControlListeners = () => {
  $$('.section-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('collapsed');
    });
  });

  $$('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      const group = s.dataset.group;
      $$(`.swatch[data-group="${group}"]`).forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      const color = s.dataset.color;
      const hexInput = $(`#${group}-hex`);
      if (hexInput) hexInput.value = color.replace('#','');

      if (group === 'wall-color') bgState.wallColor = color;
      else if (group === 'lower-color') bgState.lowerColor = color;
      else if (group === 'base-color') bgState.baseboardColor = color;
      else if (group === 'frame-finish') {
        frameState.finish = s.dataset.name || Object.keys(PAL.frameFinishes).find(k => PAL.frameFinishes[k] === color) || 'gold leaf';
      }
      scheduleRender();
    });
  });

  $$('.hex-input-row input').forEach(inp => {
    inp.addEventListener('change', () => {
      const val = '#' + inp.value.replace('#','');
      const group = inp.id.replace('-hex','');
      if (group === 'wall-color') bgState.wallColor = val;
      else if (group === 'lower-color') bgState.lowerColor = val;
      else if (group === 'base-color') bgState.baseboardColor = val;
      scheduleRender();
    });
  });

  if (currentMode === 'background') {
    const wallType = $('#wall-type');
    if (wallType) wallType.addEventListener('change', () => { bgState.wallType = wallType.value; bgState.wallSubType = (wallSubTypes[wallType.value]||[])[0]||''; rebuildControls(); scheduleRender(); });
    const wallSub = $('#wall-subtype');
    if (wallSub) wallSub.addEventListener('change', () => { bgState.wallSubType = wallSub.value; scheduleRender(); });
    const divEn = $('#divider-enabled');
    if (divEn) divEn.addEventListener('change', () => { bgState.dividerEnabled = divEn.checked; scheduleRender(); });
    const divType = $('#divider-type');
    if (divType) divType.addEventListener('change', () => { bgState.dividerType = divType.value; scheduleRender(); });
    const lwEn = $('#lower-enabled');
    if (lwEn) lwEn.addEventListener('change', () => { bgState.lowerEnabled = lwEn.checked; scheduleRender(); });
    const lwType = $('#lower-type');
    if (lwType) lwType.addEventListener('change', () => { bgState.lowerType = lwType.value; scheduleRender(); });
    const bsEn = $('#base-enabled');
    if (bsEn) bsEn.addEventListener('change', () => { bgState.baseboardEnabled = bsEn.checked; scheduleRender(); });
    const bgW = $('#bg-w');
    if (bgW) bgW.addEventListener('change', () => { bgState.width = parseInt(bgW.value)||1778; scheduleRender(); });
    const bgH = $('#bg-h');
    if (bgH) bgH.addEventListener('change', () => { bgState.height = parseInt(bgH.value)||1000; scheduleRender(); });
  }

  if (currentMode === 'frames') {
    $$('.preset-pill').forEach(p => {
      p.addEventListener('click', () => {
        const name = p.dataset.preset;
        const pr = presets[name];
        if (!pr) return;
        frameState.preset = name;
        Object.assign(frameState, { ...pr, profiles: [...pr.profiles] });
        rebuildControls();
        scheduleRender();
      });
    });

    $$('.remove-profile').forEach(r => {
      r.addEventListener('click', (e) => {
        e.stopPropagation();
        frameState.profiles.splice(parseInt(r.dataset.idx), 1);
        rebuildControls();
        scheduleRender();
      });
    });

    const addBtn = $('#add-profile-btn');
    if (addBtn) addBtn.addEventListener('click', () => {
      const sel = $('#add-profile-sel');
      if (sel && frameState.profiles.length < 8) {
        frameState.profiles.push(sel.value);
        rebuildControls();
        scheduleRender();
      }
    });

    ['A','B','C','D'].forEach(z => {
      const sel = $(`#orn-${z}`);
      if (sel) sel.addEventListener('change', () => { frameState[`ornament${z}`] = sel.value; scheduleRender(); });
    });

    const cornSel = $('#frame-corners');
    if (cornSel) cornSel.addEventListener('change', () => { frameState.corners = cornSel.value; scheduleRender(); });
    const linerSel = $('#frame-liner');
    if (linerSel) linerSel.addEventListener('change', () => { frameState.liner = linerSel.value; scheduleRender(); });
    const agingSel = $('#frame-aging');
    if (agingSel) agingSel.addEventListener('change', () => { frameState.aging = agingSel.value; scheduleRender(); });
    const frW = $('#fr-w');
    if (frW) frW.addEventListener('change', () => { frameState.width = parseInt(frW.value)||400; scheduleRender(); });
    const frH = $('#fr-h');
    if (frH) frH.addEventListener('change', () => { frameState.height = parseInt(frH.value)||500; scheduleRender(); });
  }
};

// ════════════════════════════════════════════════════════════════
// wall drawing
// ════════════════════════════════════════════════════════════════

const drawWall = (ctx, w, h) => {
  const wallColor = bgState.wallColor;
  const rand = seededRandom(42);
  ctx.fillStyle = wallColor;
  ctx.fillRect(0, 0, w, h);
  const baseH = bgState.baseboardEnabled ? 30 : 0;
  const dividerH = bgState.dividerEnabled ? 20 : 0;
  const lowerH = bgState.lowerEnabled ? h * 0.32 : 0;
  const wallTop = 0;
  const wallBottom = h - lowerH - dividerH - baseH;
  drawWallPattern(ctx, 0, wallTop, w, wallBottom, wallColor, bgState.wallType, bgState.wallSubType, rand);
  if (bgState.lowerEnabled) { const ly = h - lowerH - baseH; drawLowerWall(ctx, 0, ly, w, lowerH, bgState.lowerColor, bgState.lowerType, rand); }
  if (bgState.dividerEnabled) { const dy = h - lowerH - dividerH - baseH; drawDivider(ctx, 0, dy, w, dividerH, bgState.dividerType, wallColor); }
  if (bgState.baseboardEnabled) { drawBaseboard(ctx, 0, h - baseH, w, baseH, bgState.baseboardColor); }
};

const drawWallPattern = (ctx, x, y, w, h, color, type, subType, rand) => {
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  const [cr, cg, cb] = hexToRgb(color);
  if (type === 'painted') {
    for (let i = 0; i < 800; i++) { const px = x + rand() * w; const py = y + rand() * h; const a = 0.02 + rand() * 0.03; ctx.fillStyle = `rgba(${rand()>0.5?255:0},${rand()>0.5?255:0},${rand()>0.5?255:0},${a})`; ctx.fillRect(px, py, 2, 2); }
  } else if (type === 'wallpaper') { drawWallpaperPattern(ctx, x, y, w, h, color, subType, rand);
  } else if (type === 'wood') { drawWoodPattern(ctx, x, y, w, h, color, rand);
  } else if (type === 'fabric') { drawFabricPattern(ctx, x, y, w, h, color, subType, rand); }
  ctx.restore();
};

const drawWallpaperPattern = (ctx, x, y, w, h, color, sub, rand) => {
  const light = shadeColor(color, 20);
  const dark = shadeColor(color, -15);
  if (sub === 'damask' || sub === '') { const spacingX = 180; const spacingY = 200; for (let row = -1; row < h / spacingY + 1; row++) { for (let col = -1; col < w / spacingX + 1; col++) { const cx = x + col * spacingX + (row % 2 === 0 ? 0 : spacingX / 2); const cy = y + row * spacingY; drawDamaskMedallion(ctx, cx, cy, light, dark, 0.4); } }
  } else if (sub === 'morris') { const sp = 140; for (let row = -1; row < h / sp + 1; row++) { for (let col = -1; col < w / sp + 1; col++) { const cx = x + col * sp + (row % 2 === 0 ? 0 : sp / 2); const cy = y + row * sp; drawMorrisMotif(ctx, cx, cy, light, dark); } }
  } else if (sub === 'stripes') { const sw = 40; for (let sx = x; sx < x + w; sx += sw * 2) { ctx.fillStyle = light; ctx.globalAlpha = 0.25; ctx.fillRect(sx, y, sw, h); } ctx.globalAlpha = 1;
  } else if (sub === 'flock') { const spacingX = 160; const spacingY = 180; for (let row = -1; row < h / spacingY + 1; row++) { for (let col = -1; col < w / spacingX + 1; col++) { const cx = x + col * spacingX + (row % 2 === 0 ? 0 : spacingX / 2); const cy = y + row * spacingY; drawDamaskMedallion(ctx, cx, cy, light, dark, 0.55); } }
  } else if (sub === 'toile') { const sp = 200; for (let row = -1; row < h / sp + 1; row++) { for (let col = -1; col < w / sp + 1; col++) { const cx = x + col * sp + (row % 2 === 0 ? 0 : sp * 0.4); const cy = y + row * sp; drawToileScene(ctx, cx, cy, dark); } }
  } else if (sub === 'brocade') { const sp = 200; for (let row = -1; row < h / sp + 1; row++) { for (let col = -1; col < w / sp + 1; col++) { const cx = x + col * sp + (row % 2 === 0 ? 0 : sp / 2); const cy = y + row * sp; drawBrocadeMedallion(ctx, cx, cy, light, '#DAA520'); } }
  } else if (sub === 'leather') { const tileSize = 80; for (let row = 0; row < h / tileSize + 1; row++) { for (let col = 0; col < w / tileSize + 1; col++) { const tx = x + col * tileSize; const ty = y + row * tileSize; ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.strokeRect(tx + 4, ty + 4, tileSize - 8, tileSize - 8); ctx.strokeStyle = light; ctx.lineWidth = 1; ctx.strokeRect(tx + 6, ty + 6, tileSize - 12, tileSize - 12); } } }
};

const drawDamaskMedallion = (ctx, cx, cy, light, dark, alpha) => { ctx.save(); ctx.globalAlpha = alpha; ctx.beginPath(); ctx.moveTo(cx, cy - 70); ctx.bezierCurveTo(cx + 40, cy - 60, cx + 50, cy - 30, cx + 45, cy); ctx.bezierCurveTo(cx + 50, cy + 30, cx + 40, cy + 60, cx, cy + 70); ctx.bezierCurveTo(cx - 40, cy + 60, cx - 50, cy + 30, cx - 45, cy); ctx.bezierCurveTo(cx - 50, cy - 30, cx - 40, cy - 60, cx, cy - 70); ctx.fillStyle = light; ctx.fill(); ctx.beginPath(); ctx.moveTo(cx + 45, cy - 20); ctx.bezierCurveTo(cx + 65, cy - 30, cx + 70, cy - 10, cx + 60, cy); ctx.bezierCurveTo(cx + 70, cy + 10, cx + 65, cy + 30, cx + 45, cy + 20); ctx.fillStyle = dark; ctx.fill(); ctx.beginPath(); ctx.moveTo(cx - 45, cy - 20); ctx.bezierCurveTo(cx - 65, cy - 30, cx - 70, cy - 10, cx - 60, cy); ctx.bezierCurveTo(cx - 70, cy + 10, cx - 65, cy + 30, cx - 45, cy + 20); ctx.fill(); ctx.beginPath(); ctx.arc(cx, cy - 85, 4, 0, Math.PI * 2); ctx.arc(cx, cy + 85, 4, 0, Math.PI * 2); ctx.fillStyle = light; ctx.fill(); ctx.globalAlpha = 1; ctx.restore(); };

const drawMorrisMotif = (ctx, cx, cy, light, dark) => { ctx.save(); ctx.globalAlpha = 0.35; ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(cx, cy + 50); ctx.bezierCurveTo(cx + 10, cy + 20, cx - 10, cy - 10, cx, cy - 50); ctx.stroke(); for (let i = -1; i <= 1; i += 2) { ctx.beginPath(); ctx.ellipse(cx + i * 20, cy - 10, 18, 8, i * 0.5, 0, Math.PI * 2); ctx.fillStyle = light; ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + i * 15, cy + 20, 14, 6, i * -0.3, 0, Math.PI * 2); ctx.fill(); } ctx.beginPath(); ctx.arc(cx, cy - 45, 6, 0, Math.PI * 2); ctx.fillStyle = dark; ctx.fill(); ctx.globalAlpha = 1; ctx.restore(); };

const drawToileScene = (ctx, cx, cy, dark) => { ctx.save(); ctx.globalAlpha = 0.2; ctx.strokeStyle = dark; ctx.lineWidth = 1.5; ctx.fillStyle = dark; ctx.beginPath(); ctx.moveTo(cx - 5, cy + 40); ctx.lineTo(cx - 5, cy - 10); ctx.lineTo(cx + 5, cy - 10); ctx.lineTo(cx + 5, cy + 40); ctx.stroke(); ctx.beginPath(); ctx.arc(cx, cy - 30, 25, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx - 15, cy - 20, 18, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx + 15, cy - 20, 18, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.arc(cx + 50, cy + 10, 8, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx + 50, cy + 18); ctx.lineTo(cx + 50, cy + 45); ctx.moveTo(cx + 40, cy + 30); ctx.lineTo(cx + 60, cy + 30); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore(); };

const drawBrocadeMedallion = (ctx, cx, cy, light, gold) => { ctx.save(); ctx.globalAlpha = 0.4; ctx.beginPath(); for (let i = 0; i < 12; i++) { const a = (i / 12) * Math.PI * 2; const r = 40 + Math.sin(i * 3) * 10; const px = cx + Math.cos(a) * r; const py = cy + Math.sin(a) * r; i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); } ctx.closePath(); ctx.fillStyle = gold; ctx.fill(); ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI * 2); ctx.fillStyle = light; ctx.fill(); ctx.globalAlpha = 1; ctx.restore(); };

const drawWoodPattern = (ctx, x, y, w, h, color, rand) => { const plankH = 60; const light = shadeColor(color, 15); const dark = shadeColor(color, -15); for (let py = y; py < y + h; py += plankH) { const plankColor = rand() > 0.5 ? light : dark; ctx.fillStyle = plankColor; ctx.fillRect(x, py, w, plankH - 2); ctx.strokeStyle = shadeColor(plankColor, -10); ctx.lineWidth = 0.5; ctx.globalAlpha = 0.3; for (let g = 0; g < 5; g++) { const gy = py + rand() * plankH; ctx.beginPath(); ctx.moveTo(x, gy); for (let gx = x; gx < x + w; gx += 40) { ctx.lineTo(gx + 40, gy + (rand() - 0.5) * 4); } ctx.stroke(); } ctx.globalAlpha = 1; ctx.fillStyle = shadeColor(color, -25); ctx.fillRect(x, py + plankH - 2, w, 2); } };

const drawFabricPattern = (ctx, x, y, w, h, color, sub, rand) => { const light = shadeColor(color, 12); const dark = shadeColor(color, -8); if (sub === 'silk' || sub === '') { for (let sy = y; sy < y + h; sy += 3) { ctx.fillStyle = sy % 6 === 0 ? light : color; ctx.globalAlpha = 0.15; ctx.fillRect(x, sy, w, 2); } ctx.globalAlpha = 1; } else if (sub === 'velvet') { ctx.fillStyle = mulColor(color, 0.85); ctx.fillRect(x, y, w, h); for (let i = 0; i < 600; i++) { ctx.fillStyle = `rgba(255,255,255,${0.01 + rand() * 0.02})`; ctx.fillRect(x + rand() * w, y + rand() * h, 1, 1); } } else if (sub === 'linen') { ctx.strokeStyle = dark; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.15; const sp = 4; for (let lx = x; lx < x + w; lx += sp) { ctx.beginPath(); ctx.moveTo(lx, y); ctx.lineTo(lx, y + h); ctx.stroke(); } for (let ly = y; ly < y + h; ly += sp) { ctx.beginPath(); ctx.moveTo(x, ly); ctx.lineTo(x + w, ly); ctx.stroke(); } ctx.globalAlpha = 1; } };

const drawLowerWall = (ctx, x, y, w, h, color, type, rand) => { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); const light = shadeColor(color, 20); const dark = shadeColor(color, -20); if (type === 'beadboard') { const bw = 24; ctx.strokeStyle = dark; ctx.lineWidth = 1; for (let bx = x; bx < x + w; bx += bw) { ctx.beginPath(); ctx.moveTo(bx, y); ctx.lineTo(bx, y + h); ctx.stroke(); ctx.strokeStyle = light; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(bx + 1, y); ctx.lineTo(bx + 1, y + h); ctx.stroke(); ctx.strokeStyle = dark; ctx.lineWidth = 1; } } else if (type === 'raised panel') { const panelW = 200, panelPad = 20, panelInner = 12; const count = Math.ceil(w / panelW); for (let i = 0; i < count; i++) { const px = x + i * panelW + panelPad; const py = y + panelPad; const pw = panelW - panelPad * 2; const ph = h - panelPad * 2; ctx.fillStyle = light; ctx.fillRect(px, py, pw, ph); ctx.fillStyle = dark; ctx.fillRect(px + 3, py + 3, pw - 3, ph - 3); ctx.fillStyle = color; ctx.fillRect(px + 6, py + 6, pw - 9, ph - 9); ctx.fillStyle = light; ctx.fillRect(px + panelInner, py + panelInner, pw - panelInner * 2, ph - panelInner * 2); ctx.fillStyle = dark; ctx.fillRect(px + panelInner + 2, py + panelInner + 2, pw - panelInner * 2 - 2, ph - panelInner * 2 - 2); ctx.fillStyle = shadeColor(color, 5); ctx.fillRect(px + panelInner + 4, py + panelInner + 4, pw - panelInner * 2 - 6, ph - panelInner * 2 - 6); } } else if (type === 'flat panel') { const panelW = 200, pad = 18; const count = Math.ceil(w / panelW); for (let i = 0; i < count; i++) { ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.strokeRect(x + i * panelW + pad, y + pad, panelW - pad * 2, h - pad * 2); } } else if (type === 'board & batten') { const bw = 100, batW = 8; for (let bx = x; bx < x + w; bx += bw) { ctx.fillStyle = dark; ctx.fillRect(bx + bw / 2 - batW / 2, y, batW, h); ctx.fillStyle = light; ctx.fillRect(bx + bw / 2 - batW / 2 + 1, y, 1, h); } } else if (type === 'stone') { const bh = 50, bw = 120; let rowIdx = 0; for (let sy = y; sy < y + h; sy += bh) { const offset = (rowIdx % 2) * bw / 2; for (let sx = x - bw; sx < x + w + bw; sx += bw) { const stoneColor = shadeColor(color, (rand() - 0.5) * 20); ctx.fillStyle = stoneColor; ctx.fillRect(sx + offset + 2, sy + 2, bw - 4, bh - 4); ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.strokeRect(sx + offset, sy, bw, bh); } rowIdx++; } } else if (type === 'marble') { ctx.fillStyle = '#f0ece4'; ctx.fillRect(x, y, w, h); ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 1; ctx.globalAlpha = 0.4; for (let i = 0; i < 15; i++) { ctx.beginPath(); const sx = x + rand() * w; const sy = y + rand() * h; ctx.moveTo(sx, sy); for (let j = 0; j < 6; j++) { ctx.lineTo(sx + (rand() - 0.3) * 200, sy + (rand() - 0.5) * 80); } ctx.stroke(); } ctx.globalAlpha = 1; } else if (type === 'wood planks') { drawWoodPattern(ctx, x, y, w, h, color, rand); } };

const drawDivider = (ctx, x, y, w, h, type, wallColor) => { const light = shadeColor(wallColor, 40); const mid = shadeColor(wallColor, 20); const dark = shadeColor(wallColor, -10); if (type === 'chair rail') { ctx.fillStyle = light; ctx.fillRect(x, y, w, h); ctx.fillStyle = mid; ctx.fillRect(x, y + 3, w, h - 6); ctx.fillStyle = dark; ctx.fillRect(x, y + h - 3, w, 3); ctx.fillStyle = light; ctx.fillRect(x, y + 1, w, 2); } else if (type === 'molding') { ctx.fillStyle = mid; ctx.fillRect(x, y, w, h); ctx.fillStyle = light; ctx.fillRect(x, y, w, 4); ctx.fillStyle = dark; ctx.fillRect(x, y + h - 4, w, 4); ctx.fillStyle = light; ctx.fillRect(x, y + h / 2 - 2, w, 3); } else if (type === 'picture rail') { ctx.fillStyle = mid; ctx.fillRect(x, y, w, h); ctx.fillStyle = light; ctx.fillRect(x, y + 2, w, 3); ctx.fillStyle = dark; ctx.fillRect(x, y + h - 2, w, 2); } };

const drawBaseboard = (ctx, x, y, w, h, color) => { const light = shadeColor(color, 25); const dark = shadeColor(color, -20); ctx.fillStyle = color; ctx.fillRect(x, y, w, h); ctx.fillStyle = light; ctx.fillRect(x, y, w, 3); ctx.fillStyle = dark; ctx.fillRect(x, y + h - 2, w, 2); };

// ════════════════════════════════════════════════════════════════
// frame drawing
// ════════════════════════════════════════════════════════════════

const drawFrame = (ctx, cw, ch) => { const artW = frameState.width; const artH = frameState.height; const profiles = frameState.profiles; const finishColor = PAL.frameFinishes[frameState.finish] || '#DAA520'; const totalProfiles = profiles.length || 1; const railWidth = Math.max(30, Math.min(120, Math.max(artW, artH) * 0.12)); const profileWidth = railWidth / totalProfiles; const linerWidth = frameState.liner !== 'none' ? 12 : 0; const totalW = artW + (railWidth + linerWidth) * 2; const totalH = artH + (railWidth + linerWidth) * 2; const ox = (cw - totalW) / 2; const oy = (ch - totalH) / 2; ctx.fillStyle = '#e8e4dc'; ctx.fillRect(0, 0, cw, ch); ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(ox + 8, oy + 10, totalW, totalH); let inset = 0; profiles.forEach((profile, idx) => { const pw = profileWidth; const rx = ox + inset; const ry = oy + inset; const rw = totalW - inset * 2; const rh = totalH - inset * 2; drawProfileBand(ctx, rx, ry, rw, rh, pw, profile, finishColor, idx, totalProfiles); const zoneIdx = Math.floor((idx / totalProfiles) * 4); const zoneKey = ['A','B','C','D'][zoneIdx]; const ornament = frameState[`ornament${zoneKey}`]; if (ornament && ornament !== 'none') { drawOrnaments(ctx, rx, ry, rw, rh, pw, ornament, finishColor); } inset += pw; }); if (frameState.corners !== 'plain miter') { drawCornerOrnaments(ctx, ox, oy, totalW, totalH, railWidth, frameState.corners, finishColor); } if (frameState.liner !== 'none') { const lx = ox + railWidth; const ly = oy + railWidth; const lw = totalW - railWidth * 2; const lh = totalH - railWidth * 2; drawLiner(ctx, lx, ly, lw, lh, linerWidth, frameState.liner, finishColor); } const ax = ox + railWidth + linerWidth; const ay = oy + railWidth + linerWidth; ctx.fillStyle = '#d4d0c8'; ctx.fillRect(ax, ay, artW, artH); ctx.strokeStyle = '#bbb8b0'; ctx.lineWidth = 1; ctx.strokeRect(ax, ay, artW, artH); ctx.strokeStyle = '#c0bdb5'; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax + artW, ay + artH); ct const drawProfileBand = (ctx, rx, ry, rw, rh, pw, profile, color, idx, total) => { const light = shadeColor(color, 35); const mid = color; const dark = shadeColor(color, -35); drawTrapezoid(ctx, rx, ry, rx + rw, ry, rx + rw - pw, ry + pw, rx + pw, ry + pw, profile, light, mid, dark, 'top'); drawTrapezoid(ctx, rx + pw, ry + rh - pw, rx + rw - pw, ry + rh - pw, rx + rw, ry + rh, rx, ry + rh, profile, light, mid, dark, 'bottom'); drawTrapezoid(ctx, rx, ry, rx + pw, ry + pw, rx + pw, ry + rh - pw, rx, ry + rh, profile, light, mid, dark, 'left'); drawTrapezoid(ctx, rx + rw - pw, ry + pw, rx + rw, ry, rx + rw, ry + rh, rx + rw - pw, ry + rh - pw, profile, light, mid, dark, 'right'); };

if (currentMode === 'background') { const wc = bgState.wallColor; const rand = seededRandom(42); svgRect(0,0,w,h,wc,1); const baseH=bgState.baseboardEnabled?30:0, divH=bgState.dividerEnabled?20:0, lwH=bgState.lowerEnabled?h*0.32:0; const wallB=h-lwH-divH-baseH; if(bgState.wallType==='painted'){for(let i=0;i<200;i++) svgRect(rand()*w,rand()*wallB,2,2,rand()>0.5?'#fff':'#000',0.025);} else if(bgState.wallType==='wallpaper'){const lt=shadeColor(wc,20),dk=shadeColor(wc,-15); if(['damask','flock','brocade',''].includes(bgState.wallSubType)){const spX=bgState.wallSubType==='flock'?160:180,spY=bgState.wallSubType==='flock'?180:200;const al=bgState.wallSubType==='flock'?0.55:0.4;for(let r=0;r<wallB/spY+1;r++) for(let c=-1;c<w/spX+1;c++){const cx=c*spX+(r%2===0?0:spX/2),cy=r*spY;svgEllipse(cx,cy,45,70,lt,al);svgCircle(cx,cy-85,4,dk,al);svgCircle(cx,cy+85,4,dk,al);}} else if(bgState.wallSubType==='stripes'){for(let sx=0;sx<w;sx+=80) svgRect(sx,0,40,wallB,lt,0.25);} else if(bgState.wallSubType==='morris'){for(let r=0;r<wallB/140+1;r++) for(let c=-1;c<w/140+1;c++){const cx=c*140+(r%2===0?0:70),cy=r*140;svgLine(cx,cy+50,cx,cy-50,dk,2,0.35);svgEllipse(cx-20,cy-10,18,8,lt,0.35,30);svgEllipse(cx+20,cy-10,18,8,lt,0.35,-30);svgCircle(cx,cy-45,6,dk,0.35);}} else if(bgState.wallSubType==='toile'){for(let r=0;r<wallB/200+1;r++) for(let c=-1;c<w/200+1;c++){const cx=c*200+(r%2===0?0:80),cy=r*200;svgEllipse(cx,cy,20,30,dk,0.2);svgRect(cx+25,cy-15,30,25,dk,0.15);}} else if(bgState.wallSubType==='leather'){for(let r=0;r<wallB/80+1;r++) for(let c=0;c<w/80+1;c++){els.push(`<rect x="${c*80+4}" y="${r*80+4}" width="72" height="72" fill="none" stroke="${dk}" stroke-width="2"/>`);}}} else if(bgState.wallType==='wood'){for(let py=0;py<wallB;py+=40){svgRect(0,py,w,39,shadeColor(wc,(py/40)%2===0?8:-8),0.5);svgRect(0,py+38,w,1,shadeColor(wc,-20),0.3);}} else if(bgState.wallType==='fabric'){if(bgState.wallSubType==='silk') for(let py=0;py<wallB;py+=6) svgRect(0,py,w,1,shadeColor(wc,15),0.1); else if(bg if(bgState.lowerEnabled){const ly=h-lwH-baseH;svgRect(0,ly,w,lwH,bgState.lowerColor,1);if(bgState.lowerType==='beadboard') for(let bx=0;bx<w;bx+=20) svgRect(bx,ly,1,lwH,shadeColor(bgState.lowerColor,-20),0.3); else if(bgState.lowerType==='raised panel'||bgState.lowerType==='flat panel') for(let px=25;px+160<w;px+=185) svgRect(px,ly+15,160,lwH-30,shadeColor(bgState.lowerColor,5),0.5); else if(bgState.lowerType==='board & batten') for(let bx=0;bx<w;bx+=80) svgRect(bx+37,ly,6,lwH,shadeColor(bgState.lowerColor,-12),0.5); else if(bgState.lowerType==='stone') for(let row=0;row*40<lwH;row++) for(let sx=-100+(row%2===0?0:50);sx<w;sx+=100) svgRect(sx+1,ly+row*40+1,98,38,shadeColor(bgState.lowerColor,row%3*5),0.3);}
if(bgState.dividerEnabled){const dy=h-lwH-divH-baseH;svgRect(0,dy,w,divH,shadeColor(wc,30),1);svgRect(0,dy,w,2,shadeColor(wc,50),0.6);} if(bgState.baseboardEnabled){svgRect(0,h-baseH,w,baseH,bgState.baseboardColor,1);svgRect(0,h-baseH,w,2,shadeColor(bgState.baseboardColor,25),0.5);}
} else { const aW=frameState.width,aH=frameState.height; const rW=Math.max(30,Math.min(120,Math.max(aW,aH)*0.12)); const liW=frameState.liner!=='none'?12:0; const tW=aW+(rW+liW)*2,tH=aH+(rW+liW)*2,pad=40; const fc=PAL.frameFinishes[frameState.finish]||'#DAA520',lt=shadeColor(fc,25),dk=shadeColor(fc,-25); const bc=frameState.profiles.length||1,bW=rW/bc; for(let b=0;b<bc;b++){const bo=b*bW,iw=tW-2*bo,ih=tH-2*bo,sh=b%2===0?lt:dk; svgRect(pad+bo,pad+bo,iw,bW,sh,1);svgRect(pad+bo,pad+bo+ih-bW,iw,bW,sh,1);svgRect(pad+bo,pad+bo+bW,bW,ih-2*bW,sh,1);svgRect(pad+bo+iw-bW,pad+bo+bW,bW,ih-2*bW,sh,1);} if(frameState.liner!=='none'){const lc={linen:'#f5f0e6',velvet:'#4a0028','gold liner':'#daa520'}[frameState.liner]||'#f5f0e6'; svgRect(pad+rW,pad+rW,tW-2*rW,liW,lc,0.9);svgRect(pad+rW,pad+tH-rW-liW,tW-2*rW,liW,lc,0.9);svgRect(pad+rW,pad+rW+liW,liW,tH-2*rW-2*liW,lc,0.9);svgRect(pad+rW+tW-2*rW-liW,pad+rW+liW,liW,tH-2*rW-2*liW,lc,0.9);} svgRect(pad+rW+liW,pad+rW+liW,aW,aH,'#f5f0e1',0.85); if(frameState.aging!=='none') svgRect(pad,pad,tW,tH,'#1a1000',{light:0.06,medium:0.12,heavy:0.22}[frameState.aging]||0); if(frameState.corners!=='plain miter'){const cm=rW/2,cs=rW*0.3;[[pad+cm,pad+cm],[pad+tW-cm,pad+cm],[pad+cm,pad+tH-cm],[pad+tW-cm,pad+tH-cm]].forEach(([cx,cy])=>{svgCircle(cx,cy,cs,lt,0.7);svgCircle(cx,cy,cs*0.4,dk,0.5);});} }
downloadText(`<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">\n${els.join('\n')}\n</svg>`, getFilename('svg'), 'image/svg+xml'); };

const exportHTML = () => { const w=canvas.width,h=canvas.height; let styles='',divs='',idx=0; const addDiv=(x,y,dw,dh,bg,op,extra='')=>{const id=`el-${idx++}`;styles+=`#${id}{position:absolute;left:${x}px;top:${y}px;width:${dw}px;height:${dh}px;background:${bg};${op<1?`opacity:${op.toFixed(3)};`:''}${extra}}\n`;divs+=`<div id="${id}"></div>\n`;}; if(currentMode==='background'){addDiv(0,0,w,h,bgState.wallColor,1);const bH=bgState.baseboardEnabled?30:0,dH=bgState.dividerEnabled?20:0,lH=bgState.lowerEnabled?Math.round(h*0.32):0; if(bgState.wallType==='wallpaper'&&bgState.wallSubType==='stripes'){const wb=h-lH-dH-bH;for(let sx=0;sx<w;sx+=80) addDiv(sx,0,40,wb,shadeColor(bgState.wallColor,20),0.25);} else if(bgState.wallType==='wood'){const wb=h-lH-dH-bH;for(let py=0;py<wb;py+=40) addDiv(0,py,w,39,shadeColor(bgState.wallColor,(py/40)%2===0?8:-8),0.5);} if(bgState.lowerEnabled){const ly=h-lH-bH;addDiv(0,ly,w,lH,bgState.lowerColor,1);if(bgState.lowerType==='beadboard') for(let bx=0;bx<w;bx+=20) addDiv(bx,ly,1,lH,shadeColor(bgState.lowerColor,-20),0.3); else if(bgState.lowerType==='raised panel') for(let px=25;px+160<w;px+=185) addDiv(px,ly+15,160,lH-30,shadeColor(bgState.lowerColor,5),0.5,`border:2px solid ${shadeColor(bgState.lowerColor,-10)};box-sizing:border-box;`);} if(bgState.dividerEnabled){const dy=h-lH-dH-bH;addDiv(0,dy,w,dH,shadeColor(bgState.wallColor,30),1);addDiv(0,dy,w,2,shadeColor(bgState.wallColor,50),0.6);} if(bgState.baseboardEnabled){addDiv(0,h-bH,w,bH,bgState.baseboardColor,1);addDiv(0,h-bH,w,2,shadeColor(bgState.baseboardColor,25),0.5);}} else{const aW=frameState.width,aH=frameState.height,rW=Math.max(30,Math.min(120,Math.max(aW,aH)*0.12));const liW=frameState.liner!=='none'?12:0,tW=aW+(rW+liW)*2,tH=aH+(rW+liW)*2,pad=40;const fc=PAL.frameFinishes[frameState.finish]||'#DAA520',lt=shadeColor(fc,25),dk=shadeColor(fc,-25);const bc=frameState.profiles.length||1,bW=rW/bc; for(let b=0;b<bc;b++){const bo=b*bW,sh=b%2===0?lt:dk,iw=tW-2*bo,ih=tH-2*bo;addDiv(pad+bo,pad+bo,iw,bW,sh,1);addDiv(pad+bo,pad+bo+ih-bW,iw,bW,sh,1);addDiv(pad+bo,pad+bo+bW,bW,ih-2*bW,sh,1);addDiv(pad+bo+iw-bW,pad+bo+bW,bW,ih-2*bW,sh,1);} addDiv(pad+rW+liW,pad+rW+liW,aW,aH,'#f5f0e1',0.85); if(frameState.aging!=='none') addDiv(pad,pad,tW,tH,'#1a1000',{light:0.06,medium:0.12,heavy:0.22}[frameState.aging]||0);} downloadText(`<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>framewall export — ${currentMode}</title>\n<style>\nbody{margin:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}\n.framewall-container{position:relative;width:${w}px;height:${h}px;overflow:hidden}\n${styles}</style></head><body>\n<div class="framewall-container">\n${divs}</div></body></html>`, getFilename('html'), 'text/html'); };

$$('.export-option').forEach(opt => { opt.addEventListener('click', () => { exportDropdown.classList.remove('open'); const fmt = opt.dataset.fmt; if(fmt==='png') exportPNG(); else if(fmt==='jpeg') exportJPEG(); else if(fmt==='svg') exportSVG(); else if(fmt==='html') exportHTML(); }); });

rebuildControls();
scheduleRender();
